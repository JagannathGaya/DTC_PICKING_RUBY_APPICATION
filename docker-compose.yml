version: "3.9"

# ---------------------------------------------------
# Shared Rails app configuration
# ---------------------------------------------------

x-app: &app
  build: .
  working_dir: /app

  volumes:
    # Mount application source
    - .:/app

  extra_hosts:
    - "host.docker.internal:host-gateway"

  environment:
    RAILS_ENV: development

    DATABASE_HOST: ${DATABASE_HOST:-192.168.66.49}
    DATABASE_PORT: ${DATABASE_PORT:-5432}
    DATABASE_NAME: ${DATABASE_NAME:-tbcorp_development}
    DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
    DATABASE_PASSWORD: ${DATABASE_PASSWORD:-Pgsql@2026}

  stdin_open: true
  tty: true

# ---------------------------------------------------
# Services
# ---------------------------------------------------

services:

  # -----------------------------------------------
  # Database setup (runs once)
  # -----------------------------------------------
  # db-setup:
  #   <<: *app
  #   container_name: tbcorp-db-setup

  #   command: >
  #     bash -c "
  #       bundle exec rails db:prepare &&
  #       bundle exec rails db:seed
  #     "

  #   restart: "no"

  # -----------------------------------------------
  # Rails web application
  # -----------------------------------------------
  web:
    <<: *app
    container_name: tbcorp-web

    command: >
      bash -c "
        rm -f tmp/pids/server.pid &&
        bundle exec rails server -b 0.0.0.0 -p 3000
      "

    ports:
      - "3000:3000"

    # depends_on:
    #   db-setup:
    #     condition: service_completed_successfully

  # -----------------------------------------------
  # Delayed Job worker (optional)
  # -----------------------------------------------
  worker:
    <<: *app
    container_name: tbcorp-worker

    command: >
      bash -c "
        bundle exec rake jobs:work
      "

    # depends_on:
    #   db-setup:
    #     condition: service_completed_successfully